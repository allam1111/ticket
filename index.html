<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta tags for PWA/App Behavior -->
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:,">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" id="pwa-theme-color" content="#004d87">
    <title>out look | Secure Portal</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style id="dynamic-style">
        :root {
            --p: #004d87;
            --s: #123c5b;
            --w: #ffffff;
            --bg: #ffffff;
            --t-size: 32px;
            --b-size: 15px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* --- LOGIN --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--p); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; font-family: 'Fredoka', sans-serif; transition: 0.5s; }
        .login-box { width: 100%; max-width: 400px; text-align: center; color: white; }
        .input-group { text-align: left; margin-bottom: 15px; width: 100%; }
        .input-group input { width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; background: rgba(255,255,255,0.1); color: white; border: 1px solid transparent; outline: none;}
        .btn-login { width: 100%; padding: 16px; background: white; color: var(--p); border-radius: 12px; font-size: 20px; font-weight: 600; cursor: pointer; border: none; font-family: 'Fredoka', sans-serif;}

        /* --- MAIN APP --- */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        .header-container { background-color: var(--p); width: 100%; padding: 25px 20px; color: white; font-family: 'Fredoka', sans-serif; position: sticky; top: 0; z-index: 1000; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar-container { width: 35px; height: 35px; border-radius: 50%; overflow: hidden; background-color: var(--s); display: flex; align-items: center; justify-content: center; }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .title { font-size: var(--t-size); margin: 0; font-weight: 500; letter-spacing: 0.5px; }
        .icons { display: flex; gap: 20px; align-items: center;}
        .icon-svg { width: 28px; height: 28px; stroke: white; stroke-width: 2; fill: none; }
        .bottom-row { display: flex; justify-content: space-between; align-items: center; }
        .switch-box { background-color: var(--s); border-radius: 50px; display: flex; overflow: hidden; }
        .btn { border: none; font-family: inherit; font-size: 20px; padding: 8px 25px; cursor: pointer; background: transparent; color: white; }
        .btn.active { background-color: var(--w); color: #000; border-radius: 50px; font-weight: 600; }
        .filter-btn { background-color: var(--s); color: white; border-radius: 50px; font-size: 20px; padding: 8px 25px; border: none;}

        .email-list-container { flex-grow: 1; overflow-y: auto; background: var(--bg); padding-bottom: 80px; -webkit-overflow-scrolling: touch; }
        .email-card { display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; align-items: flex-start; text-decoration: none; cursor: pointer; }
        .avatar-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; font-size: 20px; text-transform: uppercase; }
        .row-2 { font-size: var(--b-size); color: #000; margin: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #EDEBE9; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #605E5C; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--p); }
        .nav-icon { width: 24px; height: 24px; stroke-width: 1.5; }
        .fab { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; background: white; color: var(--p); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1>out look</h1>
            <div class="input-group"><input type="email" id="login-email" placeholder="Email (1@gmail.com)"></div>
            <div class="input-group"><input type="password" id="login-pass" placeholder="Password"></div>
            <button class="btn-login" id="btn-do-login">Login</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header-container">
            <div class="top-row">
                <div class="user-info">
                    <div class="avatar-container" id="profile-container"><span id="auth-user-initials">?</span></div>
                    <h1 class="title" id="dyn-title">Inbox</h1>
                </div>
                <div class="icons">
                    <div id="admin-trigger"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg></div>
                    <svg class="icon-svg" viewBox="0 0 24 24" onclick="location.reload();"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
            <div class="bottom-row">
                <div class="switch-box">
                    <button class="btn active" id="dyn-btn-focused">Focused</button>
                    <button class="btn" id="dyn-btn-other">Other</button>
                </div>
                <button class="filter-btn" id="dyn-btn-filter">Filter</button>
            </div>
        </div>
        <div class="email-list-container" id="email-list"></div>
        <button class="fab" id="fab-icon"><svg style="width:24px; height:24px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 10-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg><span>Mail</span></a>
            <a href="#" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span>Calendar</span></a>
            <a href="#" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg><span>Apps</span></a>
        </nav>
    </div>

    <script>
        const root = document.documentElement;

        // --- THEME & TEXT SYNC (V2) ---
        firebase.database().ref('siteSettings/v2/theme').on('value', snap => {
            const t = snap.val();
            if(t) {
                root.style.setProperty('--p', t.headerColor);
                root.style.setProperty('--s', t.darkHeaderColor);
                root.style.setProperty('--bg', t.inboxBg);
                root.style.setProperty('--t-size', t.titleSize + 'px');
                root.style.setProperty('--b-size', t.bodySize + 'px');
                document.getElementById('pwa-theme-color').content = t.headerColor;
            }
        });
        firebase.database().ref('siteSettings/v2/texts').on('value', snap => {
            const tx = snap.val();
            if(tx) {
                document.getElementById('dyn-title').innerText = tx.inboxTitle;
                document.getElementById('dyn-btn-focused').innerText = tx.btnFocused;
                document.getElementById('dyn-btn-other').innerText = tx.btnOther;
                document.getElementById('dyn-btn-filter').innerText = tx.btnFilter;
            }
        });

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                loadProfilePhoto(user.email);
                loadEmails(user.email);
            }
        });

        document.getElementById('btn-do-login').onclick = () => {
            firebase.auth().signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value);
        };

        function loadProfilePhoto(email) {
            firebase.database().ref('users/' + email.replace(/\.|@/g, '_')).on('value', snap => {
                const ud = snap.val();
                if (ud && ud.photo) document.getElementById('profile-container').innerHTML = `<img src="${ud.photo}">`;
                else document.getElementById('profile-container').innerHTML = `<span>${email.charAt(0).toUpperCase()}</span>`;
            });
        }

        function loadEmails(ue) {
            firebase.database().ref('emails/').on('value', snap => {
                const list = document.getElementById('email-list');
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                Object.keys(data).reverse().forEach(k => {
                    const m = data[k];
                    if(m.target === ue || m.target === "all") {
                        list.innerHTML += `<div class="email-card" onclick="location.href='read_email.html?id=${k}'">
                            <div class="avatar-circle" style="background:${m.inbox.avatarColor}">${m.inbox.avatar}</div>
                            <div style="flex:1; overflow:hidden;">
                                <div style="display:flex; justify-content:space-between; font-family:'Fredoka';">
                                    <p style="font-weight:700; font-size:16px;">${m.inbox.sender}</p>
                                    <span style="font-size:12px; color:#666;">${m.inbox.time}</span>
                                </div>
                                <p class="row-2">${m.inbox.subject}</p>
                                <p style="color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:14px;">${m.inbox.snippet}</p>
                            </div></div>`;
                    }
                });
            });
        }

        document.getElementById('admin-trigger').onclick = () => { 
            const user = firebase.auth().currentUser;
            if(!user) {
                alert("يجب تسجيل الدخول أولاً");
                return;
            }
            const enteredEmail = prompt("يرجى كتابة الإيميل الخاص بك للتأكيد والوصول للوحة التحكم:"); 
            if(enteredEmail && enteredEmail.trim().toLowerCase() === user.email.toLowerCase()) {
                location.href = 'dashboard.html';
            } else if(enteredEmail) {
                alert("الإيميل غير متطابق!");
            }
        };
    </script>
</body>
</html>

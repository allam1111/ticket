<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Login</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blue: #004d87;
            --dark-blue: #123c5b;
            --white: #ffffff;
            --text-black: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-blue);
            font-family: 'Fredoka', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background-color: var(--dark-blue);
            padding: 40px 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: white;
            background: rgba(255,255,255,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: white;
            color: var(--text-black);
            font-family: 'Fredoka', sans-serif;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 class="title">Admin Login</h2>
        <form id="login-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@outlook.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Log In</button>
        </form>
        <a href="index.html" class="back-link">← Back to Inbox</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if (email && pass) {
                firebase.auth().signInWithEmailAndPassword(email, pass)
                    .then((userCredential) => {
                        localStorage.setItem("m-admin", "ok");
                        window.location.href = 'dashboard.html?m-admin=ok';
                    })
                    .catch((error) => {
                        alert("Login failed: " + error.message);
                    });
            }
        });
    </script>
</body>
</html>
